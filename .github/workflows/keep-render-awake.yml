name: Keep Render Backend Awake

on:
  schedule:
    - cron: "*/10 * * * *"

  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Render backend
        run: |
          echo "Pinging Cirix backend..."
          curl -f https://cirix.onrender.com/health
          echo "Backend is alive!"